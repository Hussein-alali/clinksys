<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>كينيتك — منظومة عيادة العلاج الطبيعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Amiri:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    /* brand */
    --blue-500:#7BBDE8;
    --blue-300:#BDD8E9;
    --blue-100:#E8F1F7;
    --blue-50:#F4F8FB;
    --blue-700:#3A7FB5;
    --blue-900:#1E4A6E;

    /* neutrals (cool) */
    --ink-900:#0F1E2B;
    --ink-700:#2E4458;
    --ink-500:#647686;
    --ink-400:#8898A8;
    --ink-300:#BFCAD4;
    --ink-200:#DCE3EA;
    --ink-100:#EEF2F6;
    --ink-50:#F7F9FB;
    --paper:#FCFDFE;
    --white:#FFFFFF;

    /* status */
    --green:#3FA984;
    --green-bg:#E4F2EC;
    --amber:#D49044;
    --amber-bg:#FBEFDB;
    --red:#D8665A;
    --red-bg:#FBE6E3;
    --violet:#7E6BD3;
    --violet-bg:#ECE8FA;

    /* type */
    --font-sans: 'IBM Plex Sans Arabic', 'Geist', system-ui, sans-serif;
    --font-serif: 'Amiri', 'Reem Kufi', Georgia, serif;
    --font-display: 'Reem Kufi', 'IBM Plex Sans Arabic', sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 28px;

    --shadow-sm: 0 1px 2px rgba(15,30,43,.04), 0 1px 1px rgba(15,30,43,.03);
    --shadow-md: 0 4px 14px rgba(15,30,43,.06), 0 2px 4px rgba(15,30,43,.04);
    --shadow-lg: 0 16px 40px rgba(15,30,43,.10), 0 4px 10px rgba(15,30,43,.05);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--ink-50);color:var(--ink-900);font-family:var(--font-sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  body{direction:rtl}
  /* Flip directional arrows in RTL (continue/back buttons read naturally) */
  [dir="rtl"] .btn svg path[d^="M5 12h14M12 5"],
  [dir="rtl"] .btn svg path[d^="M19 12H5M12 19"]{transform:scaleX(-1);transform-origin:center}
  /* But not chevrons (used for collapsibles, crumbs) — they auto-flip via dir anyway */
  button{font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  a{color:inherit;text-decoration:none}

  /* scrollbars */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-300);background-clip:padding-box;border:2px solid transparent}

  /* utilities */
  .row{display:flex;align-items:center}
  .col{display:flex;flex-direction:column}
  .gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}
  .grow{flex:1 1 auto}
  .mono{font-family:var(--font-mono);font-feature-settings:"tnum"}
  .serif{font-family:var(--font-serif);font-weight:400}
  .tnum{font-variant-numeric:tabular-nums}
  .muted{color:var(--ink-500)}
  .dim{color:var(--ink-400)}

  /* shared cards */
  .card{background:var(--white);border:1px solid var(--ink-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
  .card-pad{padding:20px}

  /* primary button */
  .btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;padding:9px 14px;font-weight:500;font-size:13px;border:1px solid transparent;cursor:pointer;transition:all .15s ease;white-space:nowrap}
  .btn-primary{background:var(--ink-900);color:#fff}
  .btn-primary:hover{background:#1A2D3F}
  .btn-secondary{background:#fff;color:var(--ink-900);border-color:var(--ink-200)}
  .btn-secondary:hover{background:var(--ink-50);border-color:var(--ink-300)}
  .btn-ghost{background:transparent;color:var(--ink-700)}
  .btn-ghost:hover{background:var(--ink-100)}
  .btn-blue{background:var(--blue-500);color:#fff;box-shadow:0 4px 14px rgba(123,189,232,.45)}
  .btn-blue:hover{background:var(--blue-700)}
  .btn-icon{padding:8px;border-radius:8px}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:500;line-height:1.4}
  .b-green{background:var(--green-bg);color:#2C8067}
  .b-amber{background:var(--amber-bg);color:#9B6321}
  .b-red{background:var(--red-bg);color:#A8443A}
  .b-violet{background:var(--violet-bg);color:#5A4BAD}
  .b-blue{background:var(--blue-100);color:var(--blue-900)}
  .b-grey{background:var(--ink-100);color:var(--ink-700)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* inputs */
  .input{height:36px;padding:0 12px;border-radius:10px;border:1px solid var(--ink-200);background:#fff;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
  .input:focus{border-color:var(--blue-500);box-shadow:0 0 0 4px rgba(123,189,232,.18)}
  .label{font-size:12px;font-weight:500;color:var(--ink-700);margin-bottom:6px}

  /* table */
  .tbl{width:100%;border-collapse:separate;border-spacing:0}
  .tbl th{text-align:left;font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-500);padding:10px 14px;border-bottom:1px solid var(--ink-200);background:var(--ink-50)}
  .tbl td{padding:12px 14px;border-bottom:1px solid var(--ink-100);font-size:13px}
  .tbl tr:hover td{background:var(--ink-50)}
  .tbl tr:last-child td{border-bottom:none}

  /* avatar */
  .av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-100);color:var(--blue-900);font-weight:600;font-size:12px;flex-shrink:0}
  .av.lg{width:40px;height:40px;font-size:14px}
  .av.md{width:32px;height:32px;font-size:12px}
  .av.sm{width:24px;height:24px;font-size:10px}

  /* loader */
  @keyframes spin {to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}

  @keyframes pulse {0%,100%{opacity:.5}50%{opacity:.85}}

  /* live concurrent-session pulse */
  @keyframes livePulse {0%{box-shadow:0 0 0 0 rgba(63,169,132,.55)}70%{box-shadow:0 0 0 6px rgba(63,169,132,0)}100%{box-shadow:0 0 0 0 rgba(63,169,132,0)}}
  .live-pulse{animation:livePulse 1.6s ease-out infinite}
  .skel{background:linear-gradient(90deg,var(--ink-100) 0,var(--ink-200) 40%,var(--ink-100) 80%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
  @keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* sidebar */
  .sidebar{width:240px;background:#fff;border-right:1px solid var(--ink-200);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:9px;cursor:pointer;color:var(--ink-700);font-size:13.5px;font-weight:500;margin:0 10px;transition:background .12s}
  .nav-item:hover{background:var(--ink-100)}
  .nav-item.active{background:var(--blue-100);color:var(--blue-900)}
  .nav-item.active svg{color:var(--blue-700)}
  .nav-section{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-400);padding:14px 22px 6px;font-weight:600}

  /* topbar */
  .topbar{height:62px;background:#fff;border-bottom:1px solid var(--ink-200);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:20}

  /* page header */
  .page{padding:28px 36px 60px;max-width:1480px;margin:0 auto}
  .h1{font-size:26px;font-weight:600;letter-spacing:-.01em;color:var(--ink-900);margin:0}
  .h2{font-size:18px;font-weight:600;letter-spacing:-.005em;color:var(--ink-900);margin:0}
  .h3{font-size:14px;font-weight:600;color:var(--ink-900);margin:0}
  .crumb{display:flex;align-items:center;gap:8px;color:var(--ink-500);font-size:12.5px;margin-bottom:8px}
  .crumb svg{color:var(--ink-300)}

  /* toggle */
  .switch{position:relative;width:34px;height:20px;background:var(--ink-200);border-radius:999px;cursor:pointer;transition:background .15s;flex-shrink:0}
  .switch.on{background:var(--blue-500)}
  .switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch.on .knob{left:16px}

  /* segmented */
  .seg{display:inline-flex;background:var(--ink-100);border-radius:10px;padding:3px;gap:2px}
  .seg button{background:transparent;border:none;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink-700)}
  .seg button.on{background:#fff;color:var(--ink-900);box-shadow:var(--shadow-sm)}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(15,30,43,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadein .15s ease}
  @keyframes fadein {from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);max-width:560px;width:calc(100% - 40px);max-height:calc(100vh - 60px);overflow:auto;animation:popin .18s cubic-bezier(.34,1.3,.4,1)}
  @keyframes popin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

  /* charts */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}

  /* focus ring */
  button:focus-visible, a:focus-visible, .input:focus-visible{outline:2px solid var(--blue-500);outline-offset:2px}

  /* misc */
  hr.sep{border:none;border-top:1px solid var(--ink-200);margin:0}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--ink-100);font-size:12px;color:var(--ink-700)}
  .tag-blue{background:var(--blue-100);color:var(--blue-900)}

  /* placeholder image */
  .ph{
    background-color: var(--blue-50);
    background-image:repeating-linear-gradient(135deg, transparent 0 6px, rgba(123,189,232,.18) 6px 7px);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:11px;color:var(--blue-900);
    border:1px solid var(--blue-100);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/supabase.jsx"></script>
  <script type="text/babel" src="src/core.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/screens1.jsx"></script>
  <script type="text/babel" src="src/roles.jsx"></script>
  <script type="text/babel" src="src/multisession.jsx"></script>
  <script type="text/babel" src="src/screens2.jsx"></script>
</body>
</html>
